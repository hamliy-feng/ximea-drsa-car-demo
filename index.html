<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>可解释交互式进化 多目标优化方法</title>
<style>
  :root{
    --ink:#11140f;--muted:#62685f;--paper:#f5f2e8;--panel:#fffdf6;--line:#d8d1bd;
    --green:#1b6d50;--green2:#dceee5;--red:#a24a40;--red2:#f1d9d5;--gold:#c5902e;
    --shadow:0 18px 48px rgba(17,20,15,.10)
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;color:var(--ink);
    background:linear-gradient(90deg,rgba(17,20,15,.035) 1px,transparent 1px),
      linear-gradient(rgba(17,20,15,.035) 1px,transparent 1px),var(--paper);
    background-size:30px 30px
  }
  .shell{width:min(1420px,calc(100vw - 32px));margin:0 auto;padding:22px 0}
  .top{display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:stretch}
  .title{background:var(--ink);color:var(--panel);border-radius:8px;padding:24px 28px;min-height:132px;position:relative;overflow:hidden}
  .title:after{content:"";position:absolute;right:-82px;top:-110px;width:310px;height:310px;border:42px solid rgba(220,238,229,.18);transform:rotate(22deg)}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:900;color:#b9d9ca}
  h1{margin:12px 0 0;font-size:clamp(38px,5vw,70px);line-height:.96;letter-spacing:0}
  .action{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;display:grid;align-content:center;gap:12px}
  button{border:1px solid var(--ink);border-radius:7px;background:var(--ink);color:var(--panel);font-weight:900;font-size:18px;min-height:58px;cursor:pointer}
  button:hover{transform:translateY(-1px)}
  .small{color:var(--muted);font-size:13px;line-height:1.5}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:13px 14px;min-height:76px}
  .stat strong{display:block;color:var(--green);font-size:28px;line-height:1}
  .stat span{display:block;color:var(--muted);font-size:12px;margin-top:8px}
  .main{display:grid;grid-template-columns:minmax(760px,1.42fr) minmax(360px,.58fr);gap:16px;margin-top:14px}
  .panel{background:rgba(255,253,246,.96);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
  .head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:12px}
  h2{margin:0;font-size:22px}.hint{font-size:13px;color:var(--muted);line-height:1.5}
  .chart{height:650px;background:#fffaf0;border-radius:7px;overflow:hidden;position:relative}
  svg{width:100%;height:100%;display:block}
  .legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:10px}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:-1px}
  .side-title{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .badge{border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;background:#f6eedb;color:var(--muted)}
  .selected{display:grid;gap:8px;margin-top:12px;max-height:205px;overflow:auto}
  .item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);background:#fffaf0;border-radius:7px;padding:9px}
  .item.good{border-color:#91c4ab;background:#edf8f2}.item.bad{border-color:#d59b93;background:#fff0ee}
  .item b{font-size:14px}.item div{font-size:12px;color:var(--muted);margin-top:3px}
  .mark{font-size:12px;font-weight:900}.mark.good{color:var(--green)}.mark.bad{color:var(--red)}
  .rules{display:grid;gap:9px;margin-top:12px}
  .rule{padding:11px 12px;border-radius:7px;font-size:14px;line-height:1.45;border:1px solid transparent}
  .rule.good{background:var(--green2);color:#104b38;border-color:#b9d9ca}
  .rule.bad{background:var(--red2);color:#8b3a32;border-color:#e2bcb6}
  .empty{padding:14px;border:1px dashed var(--line);border-radius:7px;background:#fffaf0;color:var(--muted);font-size:13px;line-height:1.55}
  .tip{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.6}
  @media(max-width:1050px){.top,.main{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="shell">
  <section class="top">
    <div class="title">
      <div class="eyebrow">Omega 122 (2024) 102925 · XIMEA-DRSA</div>
      <h1>可解释交互式进化 多目标优化方法</h1>
    </div>
    <div class="action">
      <button id="mainBtn" onclick="mainAction()">开始</button>
      <div class="small" id="phaseText">运行 25 代后暂停选择。</div>
    </div>
  </section>

  <section class="stats">
    <div class="stat"><strong id="gen">0</strong><span>代数</span></div>
    <div class="stat"><strong id="frontCount">0</strong><span>非支配解</span></div>
    <div class="stat"><strong id="selectedCount">0</strong><span>已标记解</span></div>
    <div class="stat"><strong id="ruleCount">0</strong><span>规则</span></div>
    <div class="stat"><strong id="phase">未开始</strong><span>状态</span></div>
  </section>

  <section class="main">
    <div class="panel">
      <div class="head">
        <div>
          <h2>解云点分布</h2>
          <div class="hint">横轴 f1，纵轴 f2，均为最大化目标。图表随全部解自动缩放。</div>
        </div>
        <div class="hint">点击点：未选 → Good → Bad → 未选</div>
      </div>
      <div class="chart"><svg id="chart" viewBox="0 0 960 660"></svg></div>
      <div class="legend">
        <span><i class="dot" style="background:var(--ink)"></i>普通解</span>
        <span><i class="dot" style="background:var(--gold)"></i>非支配解</span>
        <span><i class="dot" style="background:var(--green)"></i>Good</span>
        <span><i class="dot" style="background:var(--red)"></i>Bad</span>
      </div>
    </div>
    <div class="panel">
      <div class="side-title"><h2>交互选择</h2><span class="badge" id="needText">等待开始</span></div>
      <div class="tip">暂停后直接点图中的解进行标记，至少选择 1 个 Good 和 1 个 Bad。</div>
      <div class="selected" id="selectedList"></div>
      <h2 style="margin-top:18px">决策规则</h2>
      <div class="rules" id="rules"></div>
    </div>
  </section>
</div>

<script>
const N=180, QUERY=25, MAX_RULES=12, GAMMA=.18;
let pop=[], gen=0, rules=[], selecting=false, running=false, targetT=null;

function rnd(a,b){return a+Math.random()*(b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function make(id,t,q){
  const curve=Math.sin(t*Math.PI);
  const f1=2300+1350*t+260*q+120*curve+rnd(-38,38);
  const f2=2300+1350*(1-t)+260*q+120*curve+rnd(-38,38);
  return {id,t:clamp(t,0,1),q:clamp(q,0,1.25),f1,f2,rank:0,score:0,mark:""};
}
function reset(){
  pop=Array.from({length:N},(_,i)=>make(i+1,Math.random(),rnd(.05,.55)));
  gen=0;rules=[];selecting=false;running=false;targetT=null;evaluate();render();
}
function dominates(a,b){return a.f1>=b.f1&&a.f2>=b.f2&&(a.f1>b.f1||a.f2>b.f2)}
function rankFronts(){
  const left=[...pop];let rank=1;
  while(left.length){
    const front=left.filter(x=>!left.some(y=>y!==x&&dominates(y,x)));
    front.forEach(x=>x.rank=rank);
    front.forEach(x=>left.splice(left.indexOf(x),1));
    rank++;
  }
}
function weight(r){return Math.exp(-GAMMA*((gen-r.born)/QUERY))}
function match(x,r){
  if(r.type==="good") return x.f1>=r.q1 && x.f2>=r.q2;
  return r.axis==="f1" ? x.f1<=r.q1 : x.f2<=r.q2;
}
function evaluate(){
  rankFronts();
  pop.forEach(x=>{
    const good=rules.filter(r=>r.type==="good"&&match(x,r)).reduce((s,r)=>s+weight(r),0);
    const bad=rules.filter(r=>r.type==="bad"&&match(x,r)).reduce((s,r)=>s+weight(r),0);
    x.score=good-bad;
  });
}
function front(){return pop.filter(x=>x.rank===1).sort((a,b)=>a.f1-b.f1)}
function evolveOne(){
  evaluate();
  const sorted=[...pop].sort((a,b)=>a.rank-b.rank||b.score-a.score||(b.q-a.q));
  const elite=sorted.slice(0,32);
  const next=elite.map((x,i)=>make(i+1,x.t,x.q));
  while(next.length<N){
    const a=elite[Math.floor(Math.random()*elite.length)];
    const b=elite[Math.floor(Math.random()*elite.length)];
    let t=(a.t+b.t)/2+rnd(-.08,.08);
    if(targetT!==null) t=t*.88+targetT*.12+rnd(-.025,.025);
    const q=(a.q+b.q)/2+rnd(-.035,.055)+.012;
    next.push(make(next.length+1,t,q));
  }
  pop=next;gen++;evaluate();
  if(gen%QUERY===0){selecting=true;running=false}
}
function mainAction(){
  if(selecting){submitMarks();return}
  if(running)return;
  running=true;selecting=false;render();
  const tick=()=>{
    if(!running||selecting){running=false;render();return}
    evolveOne();render();
    if(!selecting)setTimeout(tick,55);
  };
  tick();
}
function cycleMark(id){
  if(!selecting)return;
  pop.forEach(x=>{
    if(x.id===id)x.mark=x.mark===""?"good":x.mark==="good"?"bad":"";
  });
  render();
}
function submitMarks(){
  const good=pop.filter(x=>x.mark==="good"), bad=pop.filter(x=>x.mark==="bad");
  if(!good.length||!bad.length){alert("至少选择 1 个 Good 和 1 个 Bad。");return}
  const q1=Math.floor(Math.min(...good.map(x=>x.f1)));
  const q2=Math.floor(Math.min(...good.map(x=>x.f2)));
  const b1=Math.ceil(Math.max(...bad.map(x=>x.f1)));
  const b2=Math.ceil(Math.max(...bad.map(x=>x.f2)));
  rules.push({type:"good",q1,q2,born:gen});
  rules.push({type:"bad",axis:"f1",q1:b1,born:gen});
  rules.push({type:"bad",axis:"f2",q2:b2,born:gen});
  while(rules.length>MAX_RULES)rules.shift();
  targetT=good.reduce((s,x)=>s+x.t,0)/good.length;
  pop.forEach(x=>x.mark="");
  selecting=false;
  mainAction();
}
function bounds(){
  const xs=pop.map(p=>p.f1), ys=pop.map(p=>p.f2);
  let minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const padX=(maxX-minX)*.12||100,padY=(maxY-minY)*.12||100;
  return {minX:minX-padX,maxX:maxX+padX,minY:minY-padY,maxY:maxY+padY};
}
function renderChart(){
  const b=bounds(), w=960, h=660, L=72, R=34, T=44, B=66;
  const sx=v=>L+(v-b.minX)/(b.maxX-b.minX)*(w-L-R);
  const sy=v=>h-B-(v-b.minY)/(b.maxY-b.minY)*(h-T-B);
  const fr=front();
  const axis=`<rect x="0" y="0" width="${w}" height="${h}" fill="#fffaf0"/>
    <rect x="${L}" y="${T}" width="${w-L-R}" height="${h-T-B}" fill="#fbf6e8" stroke="#d8d2bf"/>
    <line x1="${L}" y1="${h-B}" x2="${w-R}" y2="${h-B}" stroke="#8e927f"/>
    <line x1="${L}" y1="${T}" x2="${L}" y2="${h-B}" stroke="#8e927f"/>
    <text x="${w/2-80}" y="${h-20}" font-size="14" fill="#62685f">f1</text>
    <text x="24" y="32" font-size="14" fill="#62685f">f2</text>`;
  const line=fr.length>1?`<polyline points="${fr.map(p=>`${sx(p.f1)},${sy(p.f2)}`).join(" ")}" fill="none" stroke="#c5902e" stroke-width="3" opacity=".9"/>`:"";
  const pts=pop.map(p=>{
    const isFront=p.rank===1, selected=p.mark;
    const fill=selected==="good"?"#1b6d50":selected==="bad"?"#a24a40":"#11140f";
    const stroke=isFront?"#c5902e":"transparent";
    const r=selected?8:isFront?5.7:4.1;
    const op=(selected||isFront) ? .95 : .62;
    return `<circle onclick="cycleMark(${p.id})" cx="${sx(p.f1).toFixed(1)}" cy="${sy(p.f2).toFixed(1)}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${isFront?2:0}" opacity="${op}" style="cursor:${selecting?"pointer":"default"}"><title>#${p.id} f1=${p.f1.toFixed(0)} f2=${p.f2.toFixed(0)}</title></circle>`;
  }).join("");
  document.getElementById("chart").innerHTML=axis+line+pts;
}
function renderSelected(){
  const selected=pop.filter(x=>x.mark);
  document.getElementById("selectedList").innerHTML=selected.length?selected.map(x=>`<div class="item ${x.mark}">
    <div><b>#${x.id}</b><div>f1=${x.f1.toFixed(0)} · f2=${x.f2.toFixed(0)}</div></div>
    <span class="mark ${x.mark}">${x.mark.toUpperCase()}</span>
  </div>`).join(""):`<div class="empty">${selecting?"点击图中的点进行选择。":"等待开始。"}</div>`;
}
function renderRules(){
  document.getElementById("rules").innerHTML=rules.length?rules.slice().reverse().map(r=>{
    const text=r.type==="good"?`if f1 ≥ ${r.q1} and f2 ≥ ${r.q2}, then GOOD`:
      r.axis==="f1"?`if f1 ≤ ${r.q1}, then BAD`:`if f2 ≤ ${r.q2}, then BAD`;
    return `<div class="rule ${r.type}">${text}</div>`;
  }).join(""):`<div class="empty">暂无规则。</div>`;
}
function renderStats(){
  const selected=pop.filter(x=>x.mark).length;
  document.getElementById("gen").textContent=gen;
  document.getElementById("frontCount").textContent=front().length;
  document.getElementById("selectedCount").textContent=selected;
  document.getElementById("ruleCount").textContent=rules.length;
  document.getElementById("phase").textContent=selecting?"选择中":running?"运行中":gen?"暂停":"未开始";
  document.getElementById("mainBtn").textContent=selecting?"提交并继续":running?"运行中":"开始";
  document.getElementById("phaseText").textContent=selecting?"点击图中点：一次 Good，两次 Bad。":"运行 25 代后暂停选择。";
  document.getElementById("needText").textContent=selecting?"可选择":"等待";
}
function render(){evaluate();renderStats();renderChart();renderSelected();renderRules()}
reset();
</script>
</body>
</html>
